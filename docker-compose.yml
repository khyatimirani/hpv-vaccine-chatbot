# ---------------------------------------------------------------------------
# Docker Compose Configuration for HPV Vaccine Chatbot
# ---------------------------------------------------------------------------
#
# SETUP:
#   1. Copy .env.example to .env and fill in your API keys
#   2. Run: docker-compose up --build
#
# The app will be available at http://localhost (via Nginx reverse proxy)
# ---------------------------------------------------------------------------

services:

  # ---------------------------------------------------------------------------
  # Application – Flask served by Gunicorn
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Load environment variables from .env file
    # Make sure to copy .env.example to .env and fill in your values
    env_file:
      - .env
    expose:
      - "8000"
    environment:
      # Override port for this setup (Gunicorn default is 8000)
      - PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request, sys; r = urllib.request.urlopen('http://localhost:8000/health'); sys.exit(0 if r.status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Reverse proxy – Nginx with TLS termination
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Let's Encrypt certificates (obtained separately – see nginx/nginx.conf)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - app

volumes:
  certbot_webroot:
