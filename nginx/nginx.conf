# ---------------------------------------------------------------------------
# Nginx configuration for https://care.nuturcycle.com/
#
# Prerequisites on the host before starting containers:
#   1. Obtain TLS certificates with Let's Encrypt / Certbot:
#        certbot certonly --standalone -d care.nuturcycle.com
#   2. Certificates are expected at the paths referenced by ssl_certificate
#      and ssl_certificate_key below.
# ---------------------------------------------------------------------------

# Redirect all plain HTTP traffic to HTTPS
server {
    listen 80;
    server_name care.nuturcycle.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server – reverse-proxy to the Gunicorn container
server {
    listen 443 ssl;
    server_name care.nuturcycle.com;

    # ---------------------------------------------------------------------------
    # TLS certificates (managed by Certbot / Let's Encrypt)
    # ---------------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/care.nuturcycle.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/care.nuturcycle.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ---------------------------------------------------------------------------
    # Security headers
    # ---------------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # ---------------------------------------------------------------------------
    # Proxy settings
    # ---------------------------------------------------------------------------
    client_max_body_size 20M;

    location / {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  120s;   # must be >= gunicorn worker timeout (gunicorn.conf.py)
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }
}
